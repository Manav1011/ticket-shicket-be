<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razorpay Test Checkout</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 440px;
        }
        h1 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 24px;
            color: #fff;
        }
        .field {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: #888;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        input {
            width: 100%;
            padding: 10px 12px;
            background: #0f0f1a;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus { border-color: #5c6bc0; }
        input[readonly] {
            background: #12122a;
            color: #666;
            cursor: default;
        }
        .row { display: flex; gap: 12px; }
        .row .field { flex: 1; }
        .info {
            background: #12122a;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #888;
            line-height: 1.5;
        }
        .info strong { color: #5c6bc0; }
        button {
            width: 100%;
            padding: 12px;
            background: #5c6bc0;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #4a5ab5; }
        button:disabled { background: #333; cursor: not-allowed; }
        .result {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }
        .result.success { background: #1b3a2f; border: 1px solid #2d5a47; color: #4ade80; }
        .result.error { background: #3a1b1b; border: 1px solid #5a2d2d; color: #f87171; }
        .result pre {
            margin-top: 8px;
            font-size: 12px;
            color: #888;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .hint {
            font-size: 11px;
            color: #555;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Razorpay Checkout Test</h1>

        <div class="info">
            Fill in details from <strong>POST /api/events/purchase/create</strong> response, then click Pay to open the Razorpay modal.
        </div>

        <div class="field">
            <label>Razorpay Key ID</label>
            <input type="text" id="key_id" value="rzp_test_SjfBxgIfB43kM2" readonly>
        </div>

        <div class="field">
            <label>Razorpay Order ID</label>
            <input type="text" id="order_id" value="order_SnOVhZ5EtyAc7J" readonly>
        </div>

        <div class="row">
            <div class="field">
                <label>Amount (paise)</label>
                <input type="number" id="amount" value="99800">
            </div>
            <div class="field">
                <label>Currency</label>
                <input type="text" id="currency" value="INR" readonly>
            </div>
        </div>

        <div class="field">
            <label>Customer Name</label>
            <input type="text" id="name" value="Test Buyer">
        </div>

        <div class="field">
            <label>Customer Email</label>
            <input type="email" id="email" value="buyer@test.com">
        </div>

        <div class="field">
            <label>Customer Phone</label>
            <input type="text" id="phone" value="9876543213">
        </div>

        <div class="field">
            <label>Description (optional)</label>
            <input type="text" id="description" placeholder="Ticket purchase">
        </div>

        <button id="pay_btn" onclick="openCheckout()">Open Razorpay Checkout</button>

        <div id="result" class="result"></div>
    </div>

    <script>
        function openCheckout() {
            const keyId = document.getElementById('key_id').value.trim();
            const orderId = document.getElementById('order_id').value.trim();
            const amount = document.getElementById('amount').value.trim();
            const name = document.getElementById('name').value.trim() || 'Test User';
            const email = document.getElementById('email').value.trim() || 'test@example.com';
            const phone = document.getElementById('phone').value.trim() || '9876543210';
            const description = document.getElementById('description').value.trim() || 'Ticket purchase';

            if (!keyId || !orderId || !amount) {
                showResult('Please fill in Key ID, Order ID, and Amount', 'error');
                return;
            }

            const options = {
                key: keyId,
                amount: amount,
                currency: 'INR',
                name: 'Ticket Shicket',
                description: description,
                order_id: orderId,
                prefill: {
                    name: name,
                    email: email,
                    contact: phone
                },
                theme: {
                    color: '#5c6bc0'
                },
                handler: function(response) {
                    showResult(
                        'Payment successful! Razorpay will fire the webhook.\n\nPoll GET /api/events/purchase/orders/{order_id}/status to see the order become paid.',
                        'success'
                    );
                    console.log('Razorpay response:', response);
                },
                modal: {
                    ondismiss: function() {
                        showResult('Checkout modal closed. No payment made.', 'error');
                    }
                }
            };

            try {
                const rzp = new Razorpay(options);
                rzp.on('payment.failed', function(response) {
                    showResult(
                        'Payment failed: ' + (response.error?.description || response.error?.message || 'Unknown error'),
                        'error'
                    );
                    console.error('Payment failed:', response.error);
                });
                rzp.open();
            } catch (err) {
                showResult('Error opening Razorpay: ' + err.message, 'error');
            }
        }

        function showResult(message, type) {
            const el = document.getElementById('result');
            el.style.display = 'block';
            el.className = 'result ' + type;
            el.innerHTML = message.replace('\n', '<br>');
        }
    </script>
</body>
</html>
